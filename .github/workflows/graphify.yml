name: Graphify

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'graphify-out/**'
      - 'docs/**'
      - '*.md'

jobs:
  build-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: uv tool install graphifyy
      - run: |
          uv run --with graphifyy python3 -c "
          import json, os, subprocess
          from pathlib import Path
          from graphify.detect import detect
          from graphify.extract import collect_files, extract
          from graphify.build import build_from_json
          from graphify.cluster import cluster, score_all
          from graphify.analyze import god_nodes, surprising_connections, suggest_questions
          from graphify.report import generate
          from graphify.export import to_json, to_html

          detection_result = detect(Path('.'))
          files = collect_files(Path('.'))
          ast_data = extract(files)
          G = build_from_json(ast_data)
          communities = cluster(G)
          cohesion = score_all(G, communities)
          gods = god_nodes(G, top_n=10)
          surp = surprising_connections(G, communities=communities, top_n=5)

          # Load labels if they exist
          labels_path = Path('.graphify_labels.json')
          if labels_path.exists():
              with open(labels_path) as f:
                  community_labels = {int(k): v for k, v in json.load(f).items()}
          else:
              community_labels = {cid: f'Community {cid}' for cid in communities}

          questions = suggest_questions(G, communities, community_labels, top_n=7)

          commit = subprocess.check_output(['git', 'rev-parse', '--short', 'HEAD']).decode().strip()
          token_cost = {'input_tokens': ast_data.get('input_tokens', 0), 'output_tokens': ast_data.get('output_tokens', 0)}

          report = generate(G, communities, cohesion, community_labels, gods, surp, detection_result, token_cost, root='.', suggested_questions=questions, built_at_commit=commit)

          os.makedirs('graphify-out', exist_ok=True)
          with open('graphify-out/GRAPH_REPORT.md', 'w') as f:
              f.write(report)
          to_json(G, communities, 'graphify-out/graph.json', force=True, built_at_commit=commit)
          to_html(G, communities, 'graphify-out/graph.html', community_labels=community_labels, member_counts={cid: len(n) for cid, n in communities.items()})
          print('Graphify build complete')
          "
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update graphify knowledge graph"
          file_pattern: "graphify-out/*"
